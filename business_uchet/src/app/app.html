<header class="header">
  <div class="brand">
    <span class="logo-icon">📊</span>
    <span class="brand-name">Business Учёт.kz</span>
  </div>
  <nav class="nav">
    <a routerLink="/"          routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Главная</a>
    <a routerLink="/buh"       routerLinkActive="active">Бухгалтерия</a>
    <a routerLink="/crm"       routerLinkActive="active">CRM</a>
    <a routerLink="/analytics" routerLinkActive="active">Аналитика</a>
    <a routerLink="/contacts"  routerLinkActive="active">Контакты</a>
    @if (auth.isLoggedIn()) {
      <button class="btn-logout" (click)="logout()">Выйти</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active" class="btn-login">Войти</a>
    }
  </nav>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <p>© 2025 Business Учёт.kz — Бухгалтерские услуги в Алматы</p>
</footer>
